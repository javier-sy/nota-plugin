name: Generate and Publish Plugin Distributions

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'targets/**'
      - 'scripts/**'
      - 'Gemfile'
      - 'Gemfile.lock'
  workflow_dispatch:

concurrency:
  group: generate-dist
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Verify version was bumped (prevent silent Claude Code/opencode divergence)
        run: |
          VERSION=$(ruby -ryaml -e 'puts YAML.load_file("src/manifest.yml")["version"]')
          echo "src/manifest.yml version: ${VERSION}"
          echo "Checking if nota-plugin-for-opencode@${VERSION} already exists on npm..."
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://registry.npmjs.org/nota-plugin-for-opencode/${VERSION}")
          if [ "${HTTP}" = "200" ]; then
            echo "::error::nota-plugin-for-opencode@${VERSION} is already on npm. Without a bump, Claude Code would update (rolling claude-release) but opencode would not (npm rejects republish) — silent divergence. Bump and push again:"
            echo "::error::  cd MusaDSL && ./version.sh nota-plugin <new-version> && make generate && git add -A && git commit -m \"Release <new-version>\" && git push"
            exit 1
          fi
          echo "OK: ${VERSION} not yet on npm — both channels will update together."

      - name: Generate plugin distributions
        run: bundle exec ruby scripts/generate.rb

      - name: Push dist/claude-code/ to claude-release branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/claude-code
          publish_branch: claude-release
          force_orphan: true
          full_commit_message: "Generated nota plugin v${{ github.sha }}"

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish nota-plugin-for-opencode to npm
        working-directory: dist/opencode
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
